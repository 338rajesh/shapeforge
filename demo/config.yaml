verbose: true
num_cells: 1 # Number of unit cells to generate

domain:
  shape: rectangle
  bounds: [0, 0, 20, 20]  # x_min, y_min, x_max, y_max

packing:
  periodic: true
  min_gap: 0.5

shapes:
  - circle:
      vf: 0.6
      count: null
      radius: normal(2, 0.5)
  - ellipse:
      vf: 0.1
      count: null
      semi_major: normal(2, 0.1)
      semi_minor: normal(1, 0.1)

# # ----------------------------------------------

engine:
  init_method: random
  optimiser:
    name: nmspg
    max_iter: 1000
  adjust_bounds_to_exact_vf: false