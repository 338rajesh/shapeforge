num_cells: 2 # Number of unit cells to generate

domain:
  shape: rectangle
  bounds: [0, 0, 30, 30] # x_min, y_min, x_max, y_max

shapes:
  - name: Circle
    vf: 0.6
    params:
      radius: uniform(1, 0.1)

export:
  output_dir: /home/rajesh/work/repos/shapeforge/scratch/outputs/test_1
  as_array: false
  format: png # png, jpg, pdf, json, pkl, yml, npz
  plot_with:
    shape_facecolor: white
    shape_edgecolor: None
    bg_facecolor: black
    bg_edgecolor: None
    size: [512, 512]
    dpi: 100

packing:
  periodic: false
  min_gap: 0.05

verbose: 1
rng_seed: 42
# # ----------------------------------------------

engine:
  init_method: uniform
  proj_buff_ratio: 2.0
  optimiser:
    name: nmspg
    max_iter: 1000
  adjust_bounds_to_exact_vf: false
